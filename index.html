<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container py-4 py-md-5">
    <header class="site-header mb-4">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <section class="did-you-know mb-4" aria-live="polite">
      <h2 class="did-you-know-title">Did You Know?</h2>
      <p id="didYouKnowFact" class="mb-0">Loading space fact...</p>
    </section>

    <div class="filters row g-2 align-items-end mb-4">
      <div class="col-12 col-md-4">
        <label for="startDate" class="form-label mb-1">Start date</label>
        <input type="date" id="startDate" class="form-control" />
      </div>
      <div class="col-12 col-md-4">
        <label for="endDate" class="form-label mb-1">End date</label>
        <input type="date" id="endDate" class="form-control" />
      </div>
      <div class="col-12 col-md-4">
        <button id="getImagesButton" type="button" class="btn btn-dark w-100">Get Space Images</button>
      </div>
    </div>

    <div id="gallery" class="gallery row g-4" aria-live="polite">
      <div class="placeholder col-12">
        <div class="placeholder-panel">
          <div class="placeholder-icon">�</div>
          <p>Loading space photos…</p>
        </div>
      </div>
    </div>
  </div>

  <div id="imageModal" class="lightbox-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="lightbox-dialog" role="document">
      <button id="closeModalButton" type="button" class="lightbox-close" aria-label="Close modal">&times;</button>
      <img id="modalImage" src="" alt="" class="lightbox-image" />
      <div class="lightbox-content">
        <h2 id="modalTitle" class="h4 mb-1"></h2>
        <p id="modalDate" class="text-secondary small mb-2"></p>
        <p id="modalDescription" class="mb-0"></p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
